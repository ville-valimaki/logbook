<div class="row margined margined__v15">
	<div class="row__full content-filter">
		<div class="content-filter content-filter__left">
			<mat-chip-listbox aria-label="Log categorization">
				<mat-chip-option>Log</mat-chip-option>
				<mat-chip-option>Fuel</mat-chip-option>
				<mat-chip-option>Maintenance</mat-chip-option>
			</mat-chip-listbox>
		</div>
		<div class="content-filter content-filter__right">
			<mat-chip-option><mat-icon>add</mat-icon></mat-chip-option>
		</div>
	</div>
</div>
<div class="row">
	<mat-accordion class="content-row" multi>
			<mat-expansion-panel class="content-row__item" *ngFor="let entry of entries;">
				<mat-expansion-panel-header>
					<mat-panel-title class="content-entry-title">
						<mat-icon class="content-entry-title__icon">airline_stops</mat-icon>
						2023-10-10
					</mat-panel-title>
					<mat-panel-description>
						{{ entry.title }}, Sunny, 13 ms southeast, 9 &#8451;
					</mat-panel-description>
				</mat-expansion-panel-header>
				<p>This is the primary content of the panel.</p>
			</mat-expansion-panel>
	</mat-accordion>
</div>
