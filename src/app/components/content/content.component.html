<div class="row margined margined__v15">
	<div class="row__full content-filter">
		<div class="content-filter__left">
			<mat-chip-listbox aria-label="Log categorization">
				<mat-chip-option (click)="setSelectedOption('log')">Logbook</mat-chip-option>
				<mat-chip-option (click)="setSelectedOption('fuel')">Fuel log</mat-chip-option>
				<mat-chip-option (click)="setSelectedOption('maintenance')">Maintenance</mat-chip-option>
			</mat-chip-listbox>
		</div>
		<div class="content-filter__right">
			<mat-icon (click)="creating = !creating">add</mat-icon>
		</div>
	</div>
</div>
<div class="row" *ngIf="!creating">
	<mat-accordion class="content-row" multi>
			<mat-expansion-panel class="content-row__item" *ngFor="let entry of entries;">
				<mat-expansion-panel-header>
					<mat-panel-title class="content-entry-title">
						<mat-icon class="content-entry-title__icon">airline_stops</mat-icon>
						{{ entry.time }}
					</mat-panel-title>
					<mat-panel-description>
						{{ entry.title }}
					</mat-panel-description>
				</mat-expansion-panel-header>
				<p>Sunny, 13 ms southeast, 9 &#8451;</p>
				<p *ngIf="entry.description">{{ entry.description }}</p>
			</mat-expansion-panel>
	</mat-accordion>
</div>
<div class="row" *ngIf="creating">
	Lets create a post
</div>
